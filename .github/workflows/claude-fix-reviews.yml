name: Claude auto-fix Droid reviews

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

concurrency:
  group: claude-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    if: >
      (github.event.review.state == 'changes_requested' ||
       github.event.review.state == 'commented') &&
      (github.event.review.user.login == 'factory-droid[bot]' ||
       github.event.review.user.login == 'droid-review[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Claude Code fix review comments
        uses: anthropics/claude-code-action@0fe28cdb64e23015219b0e478100b7105fd7dfa1 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "factory-droid[bot],droid-review[bot]"
          trigger_phrase: ""
          prompt: |
            A code reviewer has requested changes on this PR. Read ALL review comments carefully and fix every issue they raised. For each comment:
            1. Understand what change is requested
            2. Make the fix in the correct file
            3. If a comment is just a question or suggestion, respond explaining your reasoning

            After making all fixes, commit with message: "fix: address review feedback"
