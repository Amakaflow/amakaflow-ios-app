name: Auto-merge on Droid completion

on:
  issue_comment:
    types: [created]

jobs:
  auto-merge:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'factory-droid' &&
      contains(github.event.comment.body, 'Droid finished')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check all CI passed
        id: ci-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          # Wait a moment for checks to settle
          sleep 10
          # Get check status
          STATUS=$(gh pr checks "$PR_NUMBER" --json state --jq '[.[].state] | if all(. == "SUCCESS" or . == "SKIPPED") then "ready" else "not-ready" end' 2>/dev/null || echo "not-ready")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "CI status: $STATUS"

      - name: Merge PR
        if: steps.ci-check.outputs.status == 'ready'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.issue.number }} --squash --auto || gh pr merge ${{ github.event.issue.number }} --squash
