name: Auto-merge on Droid completion

on:
  issue_comment:
    types: [created]

jobs:
  auto-merge:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.user.login, 'factory-droid') &&
      contains(github.event.comment.body, 'Droid finished')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check all CI passed
        id: ci-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          sleep 15
          # Check if all required checks passed
          FAILED=$(gh pr checks "$PR_NUMBER" --json name,state --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED" and .name != "auto-merge")] | length' 2>/dev/null || echo "99")
          if [ "$FAILED" = "0" ]; then
            echo "status=ready" >> "$GITHUB_OUTPUT"
            echo "All checks passed — ready to merge"
          else
            echo "status=not-ready" >> "$GITHUB_OUTPUT"
            echo "$FAILED checks still pending or failed"
          fi

      - name: Merge PR
        if: steps.ci-check.outputs.status == 'ready'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Merging PR #${{ github.event.issue.number }}"
          gh pr merge ${{ github.event.issue.number }} --squash --delete-branch || echo "Merge failed — may need manual merge"
