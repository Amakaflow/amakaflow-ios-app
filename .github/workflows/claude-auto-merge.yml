name: Auto-merge on Droid completion

on:
  issue_comment:
    types: [created]

jobs:
  auto-merge:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.user.login, 'factory-droid') &&
      contains(github.event.comment.body, 'Droid finished')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable native auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch \
            || echo "::warning::auto-merge enable failed — may already be set or branch protection not configured"
