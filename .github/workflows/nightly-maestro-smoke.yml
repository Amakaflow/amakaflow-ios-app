# Nightly Maestro smoke — AMA-2280 fixed decision (2026-07-06).
#
# UI smoke lives OFF the release critical path. Runs on a schedule against the
# latest main, NON-PAGING: a red run is a red run in the Actions tab, nothing
# more, until the suite proves 10 consecutive green nights (then paging may be
# reintroduced by explicit founder decision — see AMA-2280).
#
# The release workflow (ios-testflight.yml) is archive + upload ONLY.

name: Nightly Maestro Smoke

on:
  schedule:
    - cron: '0 9 * * *'   # 04:00 ET daily
  workflow_dispatch: {}

concurrency:
  group: nightly-smoke
  cancel-in-progress: true

env:
  XCODE_VERSION: "26.2"
  MAESTRO_VERSION: "2.6.1"

jobs:
  nightly-smoke:
    name: Nightly Maestro smoke (golden-path + feature-presence)
    runs-on: macos-15
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select pinned Xcode
        id: xcode
        run: .github/scripts/ci/select-xcode.sh

      - name: Install GNU coreutils (Maestro timeout hard-kill)
        run: |
          if ! command -v gtimeout >/dev/null 2>&1; then
            brew install coreutils
          fi
          gtimeout --version

      - name: Compute build number (artifact label)
        id: build-number
        run: |
          BUILD_NUMBER=$((100 + ${{ github.run_number }}))
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Smoke artifact build label: $BUILD_NUMBER"

      - name: Determine simulator
        id: simulator
        timeout-minutes: 5
        run: |
          set -euo pipefail
          MIN_IOS="18.6"
          CURRENT_IOS=""
          BEST_IOS=""
          BEST_NAME=""
          BEST_UDID=""
          while IFS= read -r line; do
            if [[ "$line" =~ ^--\ iOS\ ([0-9]+\.[0-9]+)\ --$ ]]; then
              CURRENT_IOS="${BASH_REMATCH[1]}"
              continue
            fi
            if [[ -n "$CURRENT_IOS" && "$line" =~ iPhone && ! "$line" =~ iPhone\ SE && "$line" =~ \(([0-9A-F-]{36})\) ]]; then
              if [ "$(printf '%s\n' "$MIN_IOS" "$CURRENT_IOS" | sort -V | tail -1)" = "$CURRENT_IOS" ]; then
                if [ -z "$BEST_IOS" ] || [ "$(printf '%s\n' "$BEST_IOS" "$CURRENT_IOS" | sort -V | tail -1)" = "$CURRENT_IOS" ]; then
                  BEST_IOS="$CURRENT_IOS"
                  BEST_UDID=$(echo "$line" | sed -n 's/.*(\([0-9A-F-]\{36\}\)).*/\1/p')
                  BEST_NAME=$(echo "$line" | sed -E 's/^[[:space:]]+(iPhone[^(]+)\(.*/\1/' | sed 's/[[:space:]]*$//')
                fi
              fi
            fi
          done < <(xcrun simctl list devices available)
          if [ -z "$BEST_UDID" ]; then
            echo "No iPhone simulator on iOS >= $MIN_IOS" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $BEST_NAME ($BEST_UDID) on iOS $BEST_IOS"
          echo "name=$BEST_NAME" >> "$GITHUB_OUTPUT"
          echo "udid=$BEST_UDID" >> "$GITHUB_OUTPUT"
          echo "ios=$BEST_IOS" >> "$GITHUB_OUTPUT"
          xcrun simctl shutdown all || true
          # AMA-2277: fresh runners are already clean — erase triggers a multi-minute
          # indexing storm. Uninstall the app only so the next install is deterministic.
          xcrun simctl uninstall "$BEST_UDID" com.myamaka.AmakaFlowCompanion 2>/dev/null || true
          # Do NOT boot/open Simulator here — booting before xcodebuild causes
          # AssetCatalogSimulatorAgent handshake flakes on GHA (run 28805953580).
          # xcodebuild boots the sim when building; we open Simulator after build.

      - name: Restore Maestro cache
        uses: actions/cache@v4
        with:
          path: ~/.maestro
          key: maestro-${{ runner.os }}-${{ env.MAESTRO_VERSION }}

      - name: Install Maestro
        run: .github/scripts/ci/install-maestro.sh

      - name: Restore SPM cache
        uses: actions/cache@v4
        with:
          path: AmakaFlowCompanion/.spm
          key: spm-tf-${{ runner.os }}-${{ steps.xcode.outputs.version }}-${{ hashFiles('AmakaFlowCompanion/AmakaFlowCompanion.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'AmakaFlowCompanion/AmakaFlowCompanion.xcodeproj/project.pbxproj') }}
          restore-keys: |
            spm-tf-${{ runner.os }}-${{ steps.xcode.outputs.version }}-

      - name: Restore DerivedData cache
        uses: actions/cache@v4
        with:
          path: AmakaFlowCompanion/DerivedData-smoke
          key: dd-smoke-${{ runner.os }}-${{ hashFiles('AmakaFlowCompanion/AmakaFlowCompanion.xcodeproj/project.pbxproj', 'AmakaFlow/**/*.swift', 'AmakaFlowCompanion/**/*.swift') }}
          restore-keys: dd-smoke-${{ runner.os }}-

      # Debug sim build with the staging Clerk key baked in. Per
      # Environment.swift, DEBUG builds default to `.staging`, so the
      # journey hits the staging backend (same as scripts/sim-build.sh).
      # Use DerivedData-smoke (not DerivedData) so we never restore the
      # Release archive cache from the testflight job into a Debug sim build.
      - name: Build Debug app for simulator (staging)
        timeout-minutes: 20
        working-directory: AmakaFlowCompanion
        env:
          CLERK_PUBLISHABLE_KEY_STAGING: ${{ secrets.CLERK_PUBLISHABLE_KEY_STAGING }}
          CLERK_PUBLISHABLE_KEY_DEV: ${{ secrets.CLERK_PUBLISHABLE_KEY_DEV }}
        run: |
          set -e
          CLERK_PUBLISHABLE_KEY_DEV="${CLERK_PUBLISHABLE_KEY_DEV:-pk_test_c29saWQtY2hpY2tlbi01MC5jbGVyay5hY2NvdW50cy5kZXYk}"
          SIM_UDID="${{ steps.simulator.outputs.udid }}"
          set +e
          xcodebuild build \
            -scheme AmakaFlowCompanion \
            -project AmakaFlowCompanion.xcodeproj \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${SIM_UDID}" \
            -derivedDataPath DerivedData-smoke \
            -clonedSourcePackagesDirPath .spm \
            -parallelizeTargets -jobs $(sysctl -n hw.ncpu) \
            CLERK_PUBLISHABLE_KEY_STAGING="$CLERK_PUBLISHABLE_KEY_STAGING" \
            CLERK_PUBLISHABLE_KEY_PRODUCTION="$CLERK_PUBLISHABLE_KEY_STAGING" \
            CLERK_PUBLISHABLE_KEY_DEV="$CLERK_PUBLISHABLE_KEY_DEV" \
            2>&1 | tee smoke-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          tail -30 smoke-build.log
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "::error::Debug simulator build failed (exit $BUILD_EXIT)."
            exit "$BUILD_EXIT"
          fi
          APP=$(find DerivedData-smoke/Build/Products/Debug-iphonesimulator -maxdepth 2 -name "AmakaFlowCompanion.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Debug simulator build succeeded but AmakaFlowCompanion.app not found under DerivedData-smoke/Build/Products/Debug-iphonesimulator"
            find DerivedData-smoke -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "Built app: $APP"

      - name: Boot simulator for Maestro (post-build)
        timeout-minutes: 10
        run: |
          set -euo pipefail
          SIM_UDID="${{ steps.simulator.outputs.udid }}"
          run_boot_watchdog() {
            local seconds="$1"
            shift
            if command -v gtimeout >/dev/null 2>&1; then
              gtimeout --signal=TERM --kill-after=30 "$seconds" "$@"
            elif command -v timeout >/dev/null 2>&1; then
              timeout --signal=TERM --kill-after=30 "$seconds" "$@"
            else
              "$@"
            fi
          }
          if ! run_boot_watchdog 480 xcrun simctl bootstatus "$SIM_UDID" -b; then
            echo "Simulator not booted after build — booting now..."
            xcrun simctl boot "$SIM_UDID"
            if ! run_boot_watchdog 480 xcrun simctl bootstatus "$SIM_UDID" -b; then
              echo "::error::Simulator failed to reach booted state within 8 minutes."
              xcrun simctl list devices | sed -n "/$SIM_UDID/,+3p" || true
              exit 1
            fi
          fi
          open -a Simulator
          sleep 5

      - name: Install app on simulator
        working-directory: AmakaFlowCompanion
        run: |
          APP=$(find DerivedData-smoke/Build/Products/Debug-iphonesimulator -maxdepth 2 -name "AmakaFlowCompanion.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "No .app built under DerivedData-smoke/Build/Products/Debug-iphonesimulator" >&2
            find DerivedData-smoke -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "Installing $APP on ${{ steps.simulator.outputs.udid }}"
          xcrun simctl install "${{ steps.simulator.outputs.udid }}" "$APP"
          xcrun simctl bootstatus "${{ steps.simulator.outputs.udid }}" -b

      - name: Run golden-path + feature-presence smoke
        id: smoke
        timeout-minutes: 12
        continue-on-error: true
        env:
          UITEST_CLERK_PASSWORD: ${{ secrets.UITEST_CLERK_PASSWORD }}
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "120000"
          MAESTRO_CLI_NO_ANALYTICS: "1"
          MAESTRO_FLOW_TIMEOUT_SECONDS: "360"
          SMOKE_FLOW_MAX_ATTEMPTS: "2"
          SIM_UDID: ${{ steps.simulator.outputs.udid }}
        run: |
          set +e
          chmod +x .github/scripts/ci/run-maestro-smoke-with-evidence.sh
          if [ -z "$UITEST_CLERK_PASSWORD" ]; then
            echo "::error::UITEST_CLERK_PASSWORD secret not set — golden-path smoke cannot authenticate."
            echo "outcome=skipped" >> "$GITHUB_OUTPUT"
            echo "failed_flows=none" >> "$GITHUB_OUTPUT"
            echo "failure_reason=missing_secret" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          export SMOKE_FLOW_SPECS="e2e/maestro/flows/golden-path.yaml:golden-path e2e/maestro/flows/coach/feature-presence.yaml:feature-presence"
          if .github/scripts/ci/run-maestro-smoke-with-evidence.sh; then
            echo "failed_flows=none" >> "$GITHUB_OUTPUT"
            echo "failure_reason=none" >> "$GITHUB_OUTPUT"
            echo "outcome=passed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FAILED="golden-path,feature-presence"
          FAILURE_REASON="assertion"
          if [ -f maestro-output/summary.txt ]; then
            # shellcheck disable=SC1091
            source maestro-output/summary.txt
            FAILED="${failed_flows:-golden-path,feature-presence}"
            FAILURE_REASON="${failure_reason:-assertion}"
          fi
          echo "failed_flows=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "failure_reason=${FAILURE_REASON}" >> "$GITHUB_OUTPUT"
          echo "outcome=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Hydrate smoke outputs (step timeout / kill path)
        if: always() && steps.smoke.outcome == 'failure' && steps.smoke.outputs.failed_flows == ''
        id: smoke_meta
        run: |
          FAILED="golden-path,feature-presence"
          REASON="timeout-or-unknown"
          if [ -f maestro-output/summary.txt ]; then
            # shellcheck disable=SC1091
            source maestro-output/summary.txt
            FAILED="${failed_flows:-golden-path,feature-presence}"
            REASON="${failure_reason:-timeout-or-unknown}"
          fi
          echo "failed_flows=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "failure_reason=${REASON}" >> "$GITHUB_OUTPUT"

      # ---- Paging on red (assertion failure OR Maestro timeout-kill) — before artifact upload ----



      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-path-smoke-build-${{ steps.build-number.outputs.build_number }}
          path: |
            maestro-output/
            AmakaFlowCompanion/smoke-build.log
          retention-days: 14
          if-no-files-found: warn

      - name: Fail the job if the smoke failed
        if: steps.smoke.outcome == 'failure'
        run: |
          FAILED="${{ steps.smoke.outputs.failed_flows || steps.smoke_meta.outputs.failed_flows }}"
          REASON="${{ steps.smoke.outputs.failure_reason || steps.smoke_meta.outputs.failure_reason }}"
          echo "::error::Post-upload smoke failed (${FAILED}, reason=${REASON}) — see paging + the golden-path-smoke artifact."
          exit 1
