name: Workflow Lint

on:
  pull_request:
    paths: ['.github/**']

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Collect changed workflow files
        id: changed
        run: |
          # --diff-filter=d excludes DELETED workflows — linters can only read
          # files that still exist on the head (deleting a workflow broke both
          # jobs on PR #428: actionlint "could not read", zizmor treated the
          # missing path as a GitHub repo ref).
          mapfile -t files < <(git diff --name-only --diff-filter=d "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ ${#files[@]} -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            {
              echo 'files<<EOF'
              printf '%s\n' "${files[@]}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Run actionlint
        if: steps.changed.outputs.skip != 'true'
        shell: bash
        run: |
          mapfile -t files < <(printf '%s\n' "${{ steps.changed.outputs.files }}")
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            -w /github/workspace \
            rhysd/actionlint:1.7.11 \
            -color "${files[@]}"

  zizmor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Collect changed workflow files
        id: changed
        run: |
          # --diff-filter=d excludes DELETED workflows — linters can only read
          # files that still exist on the head (deleting a workflow broke both
          # jobs on PR #428: actionlint "could not read", zizmor treated the
          # missing path as a GitHub repo ref).
          mapfile -t files < <(git diff --name-only --diff-filter=d "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ ${#files[@]} -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            {
              echo 'files<<EOF'
              printf '%s\n' "${files[@]}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Run zizmor
        if: steps.changed.outputs.skip != 'true'
        shell: bash
        run: |
          mapfile -t files < <(printf '%s\n' "${{ steps.changed.outputs.files }}")
          pipx run zizmor==1.5.0 --min-severity medium "${files[@]}"
