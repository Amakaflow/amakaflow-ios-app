# AMA-1852 / Production-Ready v1 gap #3 — CI → TestFlight auto-deploy.
#
# Builds an App Store Release archive, exports the IPA, inspects the
# embedded Info.plist (per inspect-deployed-ipa-before-claiming-shippable
# memory), and uploads to TestFlight via the App Store Connect API.
#
# Triggers ONLY on push to `main` so feature branches and PR runs don't
# burn the build minutes. Sets the build number from a base offset +
# `github.run_number` so we don't have to commit pbxproj bumps from CI
# AND never collide with the manually-uploaded build history (build 39
# was the last hand-driven upload per WORKING.md — base 100 puts CI
# safely past that).
#
# Trigger design decision (issue #328, 2026-06-17):
# Evaluated two options:
#   Option A (chosen): keep every-merge TestFlight builds; add a
#     [skip-testflight] commit-message guard as the escape hatch.
#     Rationale: solo-dev v1 sprint benefits from every merge being
#     testable on device without a separate tagging ceremony.
#   Option B (deferred): main → archive artifact only; tag v* → upload.
#     Revisit post-v1 if build-minute costs become a concern.
#
# To skip a TestFlight upload, include [skip-testflight] anywhere in
# the commit message for the push to main.  workflow_dispatch runs
# are never skipped by this guard.
#
# SHA-guarded dispatch (AMA-2281): pass expected_sha on workflow_dispatch
# to abort in seconds when origin/main HEAD differs (stale-dispatch guard).
# Example: gh workflow run ios-testflight.yml --ref main -f expected_sha=$(git rev-parse origin/main)
#
# Post-upload (AMA-2281): pushes testflight/buildNNN tag at github.sha and
# sets TestFlight "What to Test" via ASC betaBuildLocalizations API.
# Runbook: docs/ci/TESTFLIGHT_SECRETS.md
#
# Code signing (AMA-2267, 2026-07-06):
# Persisted Distribution + Development .p12 identities are imported into a
# CI keychain before archive/export so ephemeral runners reuse the same
# certs instead of minting new "Created via API" certs each run (Apple's
# cert slot limit). -allowProvisioningUpdates remains for profile refresh
# only. Setup: docs/ci/TESTFLIGHT_SECRETS.md
#
# v1 posture decision (2026-05-22): CLERK_PUBLISHABLE_KEY_PRODUCTION is
# the STAGING Clerk key. Per AMA-1796 the iOS Release config defaults to
# .staging, and per the 2026-05-22 plan "staging IS production for v1."
# When the project moves to a real production stack (post-v1.1, new
# AMA-XXXX ticket TBD), switch this to a separate
# CLERK_PUBLISHABLE_KEY_PRODUCTION_REAL secret.

name: iOS TestFlight Upload

on:
  push:
    branches: [main]
    paths:
      - 'AmakaFlow/**'
      - 'AmakaFlowCompanion/**'
      - 'e2e/maestro/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:
    inputs:
      expected_sha:
        description: >-
          Optional — abort if origin/main HEAD differs (stale-dispatch guard).
          Set to $(git rev-parse origin/main) when dispatching manually.
        required: false
        type: string

# Cancel any in-flight upload for the same ref so a rapid second merge
# doesn't double-upload (TestFlight rejects duplicate build numbers).
concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "26.2"
  MAESTRO_VERSION: "2.6.1"

jobs:
  # AMA-2281 — stale-dispatch guard: when expected_sha is set on
  # workflow_dispatch, fetch origin/main and abort before archive if HEAD differs.
  dispatch-sha-guard:
    name: Dispatch SHA guard (AMA-2281)
    if: >-
      github.event_name == 'workflow_dispatch'
      && inputs.expected_sha != ''
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout (main ref only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main
      - name: Verify expected_sha matches origin/main
        run: .github/scripts/ci/check-expected-sha.sh "${{ inputs.expected_sha }}"

  # AMA-1852 — fail in seconds if required GitHub secrets are missing or
  # malformed, before we spend ~10min on archive + export.
  secrets-preflight:
    name: Secrets preflight (AMA-1852)
    needs: [dispatch-sha-guard]
    if: >-
      always()
      && (needs.dispatch-sha-guard.result == 'success' || needs.dispatch-sha-guard.result == 'skipped')
      && (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip-testflight]'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate TestFlight secrets
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          CLERK_STAGING: ${{ secrets.CLERK_PUBLISHABLE_KEY_STAGING }}
          CLERK_DEV: ${{ secrets.CLERK_PUBLISHABLE_KEY_DEV }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_DIST_P12: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_P12 }}
          APPLE_DIST_P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          APPLE_DEV_P12: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_P12 }}
          APPLE_DEV_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${ASC_KEY_ID:-}" ] && missing+=("APP_STORE_CONNECT_API_KEY_ID")
          [ -z "${ASC_ISSUER_ID:-}" ] && missing+=("APP_STORE_CONNECT_API_KEY_ISSUER_ID")
          [ -z "${ASC_PRIVATE_KEY:-}" ] && missing+=("APP_STORE_CONNECT_API_PRIVATE_KEY")
          [ -z "${CLERK_STAGING:-}" ] && missing+=("CLERK_PUBLISHABLE_KEY_STAGING")
          # Signing secrets required for archive/upload.
          if true; then
            [ -z "${APPLE_KEYCHAIN_PASSWORD:-}" ] && missing+=("APPLE_KEYCHAIN_PASSWORD")
            [ -z "${APPLE_DIST_P12:-}" ] && missing+=("APPLE_DISTRIBUTION_CERTIFICATE_P12")
            [ -z "${APPLE_DIST_P12_PASSWORD:-}" ] && missing+=("APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD")
            [ -z "${APPLE_DEV_P12:-}" ] && missing+=("APPLE_DEVELOPMENT_CERTIFICATE_P12")
            [ -z "${APPLE_DEV_P12_PASSWORD:-}" ] && missing+=("APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            echo "Setup guide: docs/ci/TESTFLIGHT_SECRETS.md"
            exit 1
          fi
          if ! printf '%s' "$ASC_PRIVATE_KEY" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::APP_STORE_CONNECT_API_PRIVATE_KEY must be the raw .p8 PEM (include BEGIN/END lines)."
            exit 1
          fi
          validate_p12_secret() {
            local b64="$1"
            local name="$2"
            local tmp cleaned size magic
            tmp="$(mktemp)"
            cleaned="$(printf '%s' "$b64" | tr -cd 'A-Za-z0-9+/=')"
            if [ -z "$cleaned" ]; then
              echo "::error::${name} is empty. Run: gh secret set ${name} --repo Amakaflow/amakaflow-ios-app -b \"\$(openssl base64 -A -in ~/Downloads/YourCert.p12)\""
              exit 1
            fi
            if ! printf '%s' "$cleaned" | openssl base64 -d -A > "$tmp" 2>/dev/null; then
              echo "::error::${name} is not valid base64."
              exit 1
            fi
            size="$(wc -c < "$tmp" | tr -d ' ')"
            magic="$(xxd -p -l 2 "$tmp" 2>/dev/null || echo "??")"
            rm -f "$tmp"
            if [ "$size" -lt 500 ] || [ "$magic" != "3082" ]; then
              echo "::error::${name} is corrupt (${size} bytes, header ${magic}). Re-set: gh secret set ${name} --repo Amakaflow/amakaflow-ios-app -b \"\$(openssl base64 -A -in ~/Downloads/YourCert.p12)\""
              exit 1
            fi
            echo "✅ ${name}: valid .p12 (${size} bytes)"
          }
          if [ -n "${APPLE_DIST_P12:-}" ]; then
            validate_p12_secret "$APPLE_DIST_P12" "APPLE_DISTRIBUTION_CERTIFICATE_P12"
          fi
          if [ -n "${APPLE_DEV_P12:-}" ]; then
            validate_p12_secret "$APPLE_DEV_P12" "APPLE_DEVELOPMENT_CERTIFICATE_P12"
          fi
          if [ -z "${CLERK_DEV:-}" ]; then
            echo "::warning::CLERK_PUBLISHABLE_KEY_DEV not set — using solid-chicken-50 publishable default."
          fi
          echo "✅ Required TestFlight secrets present."

  # AMA-1806 — offline completion-contract gate. Validates the canonical
  # iOS WorkoutCompletionRequest fixtures against staging mapper-api's
  # published OpenAPI schema (with server _StrictModel strictness re-applied)
  # BEFORE we spend ~10min archiving. Catches the Build-38 class (iOS wire
  # payload drifted from the server Pydantic schema) deterministically — no
  # auth, just the public /openapi.json. The archive job `needs:` this, so a
  # drift fails fast and never promotes a build. (Runtime fidelity — DB
  # constraints etc. — is covered by the non-gating nightly, see
  # completion-contract-nightly.yml.)
  completion-contract:
    name: Completion contract (offline schema gate)
    needs: [dispatch-sha-guard]
    if: >-
      always()
      && (needs.dispatch-sha-guard.result == 'success' || needs.dispatch-sha-guard.result == 'skipped')
      && (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip-testflight]'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install "jsonschema>=4"
      - name: Validate completion fixtures vs staging schema
        run: |
          python scripts/preflight/validate_completion_contract.py \
            --openapi https://mapper-api.staging.amakaflow.com/openapi.json \
            --fixtures-dir AmakaFlowCompanion/AmakaFlowCompanionTests/Fixtures/CompletionPayloads \
            --schema WorkoutCompletionRequest

  testflight:
    name: Archive + Upload to TestFlight
    needs: [dispatch-sha-guard, secrets-preflight, completion-contract]
    if: >-
      always()
      && (needs.dispatch-sha-guard.result == 'success' || needs.dispatch-sha-guard.result == 'skipped')
      && (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip-testflight]'))
    runs-on: macos-15
    timeout-minutes: 40
    permissions:
      contents: write
    outputs:
      build_number: ${{ steps.build-number.outputs.build_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select pinned Xcode
        id: xcode
        run: .github/scripts/ci/select-xcode.sh

      - name: Restore SPM cache
        uses: actions/cache@v4
        with:
          path: AmakaFlowCompanion/.spm
          key: spm-tf-${{ runner.os }}-${{ steps.xcode.outputs.version }}-${{ hashFiles('AmakaFlowCompanion/AmakaFlowCompanion.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'AmakaFlowCompanion/AmakaFlowCompanion.xcodeproj/project.pbxproj') }}
          restore-keys: |
            spm-tf-${{ runner.os }}-${{ steps.xcode.outputs.version }}-

      - name: Restore DerivedData cache
        uses: actions/cache@v4
        with:
          path: AmakaFlowCompanion/DerivedData
          key: dd-tf-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            dd-tf-${{ runner.os }}-

      # Compute the TestFlight build number. Base 100 puts CI safely
      # past the last manual upload (build 39 per WORKING.md). Every
      # workflow run increments by 1 (run_number is workflow-scoped +
      # monotonically increasing). Pinned in env so all subsequent
      # steps reference the same value.
      - name: Compute build number
        id: build-number
        run: |
          BUILD_NUMBER=$((100 + ${{ github.run_number }}))
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "TestFlight build number for this run: $BUILD_NUMBER"

      # Materialise the .p8 ASC API key from the secret. Written to a
      # tmp file because xcrun altool's `--apiKey` argument expects a
      # file path, not raw key contents.
      - name: Restore App Store Connect API .p8 key
        env:
          ASC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/private_keys"
          # altool looks for AuthKey_<KEY_ID>.p8 in a couple of standard
          # locations; the one altool wants is ~/private_keys/. Writing
          # there + leaving a symlink under RUNNER_TEMP keeps the path
          # discoverable from later steps too.
          printf '%s' "$ASC_API_KEY" > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" || (
            mkdir -p "$HOME/private_keys"
            printf '%s' "$ASC_API_KEY" > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          )
          chmod 600 "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          # Sanity: file must exist + be non-empty (don't print contents).
          test -s "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      # AMA-2267 — import persisted Distribution + Development identities so
      # -allowProvisioningUpdates refreshes profiles without minting new certs.
      - name: Import persisted signing identity
        env:
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_DISTRIBUTION_CERTIFICATE_P12: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_P12 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPMENT_CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_P12 }}
          APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
        run: .github/scripts/ci/import-signing-identity.sh

      # Build the Release archive.
      # Inject the Clerk keys the same way
      # `scripts/sim-build.sh` does — without them Environment.swift
      # readers crash at launch (per `ios-clerk-keys-empty-in-pbxproj`
      # memory). For v1 the "production" key IS the staging Clerk key
      # (see header comment).
      - name: Archive (Release / iOS device)
        working-directory: AmakaFlowCompanion
        env:
          CLERK_PUBLISHABLE_KEY_DEV: ${{ secrets.CLERK_PUBLISHABLE_KEY_DEV }}
          CLERK_PUBLISHABLE_KEY_STAGING: ${{ secrets.CLERK_PUBLISHABLE_KEY_STAGING }}
          CLERK_PUBLISHABLE_KEY_PRODUCTION: ${{ secrets.CLERK_PUBLISHABLE_KEY_STAGING }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          set -e
          BUILD_NUM=${{ steps.build-number.outputs.build_number }}
          # solid-chicken-50 dev publishable key (public; same default as sim-build.sh)
          CLERK_PUBLISHABLE_KEY_DEV="${CLERK_PUBLISHABLE_KEY_DEV:-pk_test_c29saWQtY2hpY2tlbi01MC5jbGVyay5hY2NvdW50cy5kZXYk}"
          # Authenticate xcodebuild against the ASC API key directly
          # (Xcode 13+ replacement for fastlane match). Without these
          # flags `-allowProvisioningUpdates` can't download profiles
          # because the CI runner has no Apple Developer account
          # configured. Failure 2026-05-22 was exactly this:
          # "No Accounts: Add a new account in Accounts settings".
          set +e
          xcodebuild archive \
            -scheme AmakaFlowCompanion \
            -project AmakaFlowCompanion.xcodeproj \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/AmakaFlowCompanion.xcarchive \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath .spm \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUM" \
            CLERK_PUBLISHABLE_KEY_DEV="$CLERK_PUBLISHABLE_KEY_DEV" \
            CLERK_PUBLISHABLE_KEY_STAGING="$CLERK_PUBLISHABLE_KEY_STAGING" \
            CLERK_PUBLISHABLE_KEY_PRODUCTION="$CLERK_PUBLISHABLE_KEY_PRODUCTION" \
            2>&1 | tee archive.log
          ARCHIVE_EXIT=${PIPESTATUS[0]}
          set -e
          tail -50 archive.log
          if [ "$ARCHIVE_EXIT" -ne 0 ]; then
            if grep -qE "maximum number of certificates|Choose a certificate to revoke" archive.log; then
              if grep -qiE "App Development|iOS App Development|Development certificate|Development provisioning" archive.log; then
                CERT_TYPE="Apple Development"
              elif grep -qiE "Distribution|Apple Distribution" archive.log; then
                CERT_TYPE="Apple Distribution"
              else
                CERT_TYPE="Apple Development or Distribution"
              fi
              echo "::error::Apple Developer ${CERT_TYPE} certificate limit reached. Revoke unused \"Created via API\" ${CERT_TYPE} certificates at https://developer.apple.com/account/resources/certificates/list then re-run (workflow_dispatch or push to main). Setup: docs/ci/TESTFLIGHT_SECRETS.md"
            fi
            exit "$ARCHIVE_EXIT"
          fi
          # Sanity: the .xcarchive must exist + contain the .app
          test -d build/AmakaFlowCompanion.xcarchive/Products/Applications/AmakaFlowCompanion.app

      # Export the .ipa from the archive. ExportOptions.plist tells
      # xcodebuild "this is an App Store distribution build" and that
      # signing should use the team's automatic provisioning.
      - name: Write ExportOptions.plist
        working-directory: AmakaFlowCompanion
        run: |
          # destination=export (not upload). With `destination=upload`,
          # xcodebuild uploads to ASC directly and DOESN'T leave a local
          # IPA, which breaks our PlistBuddy inspection gate + the altool
          # step. With `destination=export`, we get a local IPA, can
          # inspect it (per memory inspect-deployed-ipa-before-claiming-shippable),
          # then upload via altool — gate has teeth, single upload path.
          cat > build/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        working-directory: AmakaFlowCompanion
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          set -e
          # Same ASC auth flags as the archive step — exportArchive
          # also needs them to download distribution profiles.
          xcodebuild -exportArchive \
            -archivePath build/AmakaFlowCompanion.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            2>&1 | tee export.log | tail -20
          ls -la build/export/

      # Inspect the IPA's embedded Info.plist before claiming the upload
      # is shippable (per `inspect-deployed-ipa-before-claiming-shippable`
      # memory). Fail loudly if Clerk keys didn't substitute correctly,
      # AND assert STRICT EQUALITY with the secret values — catches a
      # silent xcodebuild arg-drop where the plist has _some_ value but
      # not the right one (CR feedback on PR #228).
      - name: Inspect IPA Info.plist
        working-directory: AmakaFlowCompanion
        env:
          EXPECTED_CLERK_STAGING: ${{ secrets.CLERK_PUBLISHABLE_KEY_STAGING }}
          EXPECTED_CLERK_DEV: ${{ secrets.CLERK_PUBLISHABLE_KEY_DEV }}
        run: |
          set -e
          EXPECTED_CLERK_DEV="${EXPECTED_CLERK_DEV:-pk_test_c29saWQtY2hpY2tlbi01MC5jbGVyay5hY2NvdW50cy5kZXYk}"
          IPA=$(ls build/export/*.ipa | head -1)
          test -f "$IPA"
          echo "IPA: $IPA"
          mkdir -p /tmp/ipa-extract
          unzip -q -o "$IPA" -d /tmp/ipa-extract
          PLIST="/tmp/ipa-extract/Payload/AmakaFlowCompanion.app/Info.plist"
          test -f "$PLIST"
          echo "=== Version + build ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST"
          # Non-empty + non-placeholder checks (cheap).
          PROD_KEY=$(/usr/libexec/PlistBuddy -c "Print :CLERK_PUBLISHABLE_KEY_PRODUCTION" "$PLIST")
          STAGING_KEY=$(/usr/libexec/PlistBuddy -c "Print :CLERK_PUBLISHABLE_KEY_STAGING" "$PLIST")
          DEV_KEY=$(/usr/libexec/PlistBuddy -c "Print :CLERK_PUBLISHABLE_KEY_DEV" "$PLIST")
          test -n "$PROD_KEY"
          test "${PROD_KEY:0:1}" != '$'
          test -n "$STAGING_KEY"
          test "${STAGING_KEY:0:1}" != '$'
          # Strict equality vs the secret values. Per the 2026-05-22
          # "staging IS production for v1" decision, PROD == STAGING.
          # Mismatch = xcodebuild silently dropped an arg; fail BEFORE
          # altool spends 5-10min uploading a misconfigured build.
          if [ "$PROD_KEY" != "$EXPECTED_CLERK_STAGING" ]; then
            echo "::error::IPA Info.plist CLERK_PUBLISHABLE_KEY_PRODUCTION does not match the staging secret value. Expected hash $(echo -n "$EXPECTED_CLERK_STAGING" | shasum | cut -c1-8); got $(echo -n "$PROD_KEY" | shasum | cut -c1-8). xcodebuild arg substitution failed silently."
            exit 1
          fi
          if [ "$STAGING_KEY" != "$EXPECTED_CLERK_STAGING" ]; then
            echo "::error::IPA Info.plist CLERK_PUBLISHABLE_KEY_STAGING does not match the staging secret value."
            exit 1
          fi
          if [ "$DEV_KEY" != "$EXPECTED_CLERK_DEV" ]; then
            echo "::error::IPA Info.plist CLERK_PUBLISHABLE_KEY_DEV does not match the dev secret value."
            exit 1
          fi
          echo "✅ Info.plist sanity checks passed (non-empty, no placeholder, strict equality vs secrets)."

      - name: Upload IPA to TestFlight via altool
        id: upload
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        working-directory: AmakaFlowCompanion
        run: |
          set -e
          IPA=$(ls build/export/*.ipa | head -1)
          echo "Uploading $IPA to TestFlight..."
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --output-format normal \
            2>&1 | tee altool.log
          echo "✅ altool upload completed."

      # AMA-2281 — auto "What to Test" from merges since previous testflight/build* tag.
      # Must run BEFORE tag push so the diff anchor is still the prior build.
      # macOS runners block system pip (PEP 668) — use a job-local venv.
      - name: Set up Python for ASC notes
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set TestFlight What to Test notes (AMA-2281)
        id: notes
        continue-on-error: true
        env:
          BUILD_NUMBER: ${{ steps.build-number.outputs.build_number }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          python -m venv .venv-notes
          source .venv-notes/bin/activate
          python -m pip install --upgrade pip
          pip install -r .github/scripts/ci/requirements-asc-notes.txt
          .github/scripts/ci/set-testflight-notes.sh

      # AMA-2281 — tag this commit as testflight/buildNNN for next-release diffing.
      - name: Push testflight/build tag (AMA-2281)
        id: tag
        continue-on-error: true
        env:
          BUILD_NUMBER: ${{ steps.build-number.outputs.build_number }}
        run: .github/scripts/ci/push-testflight-build-tag.sh "${BUILD_NUMBER}"

      - name: Upload summary
        if: always()
        env:
          BUILD_NUMBER: ${{ steps.build-number.outputs.build_number }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          NOTES_OUTCOME: ${{ steps.notes.outcome }}
          TAG_OUTCOME: ${{ steps.tag.outcome }}
        run: |
          UPLOAD_STATUS="✅ uploaded"
          [ "$UPLOAD_OUTCOME" != "success" ] && UPLOAD_STATUS="❌ FAILED"

          if [ "$NOTES_OUTCOME" != "success" ]; then
            echo "::warning::TestFlight 'What to Test' notes NOT set for build ${BUILD_NUMBER}. Backfill: BUILD_NUMBER=${BUILD_NUMBER} ASC_KEY_ID=<id> ASC_ISSUER_ID=<issuer> ASC_PRIVATE_KEY=\$(cat AuthKey.p8) .github/scripts/ci/set-testflight-notes.sh"
            NOTES_STATUS="❌ FAILED (see warning)"
          else
            NOTES_STATUS="✅ set"
          fi

          if [ "$TAG_OUTCOME" != "success" ]; then
            echo "::warning::testflight/build${BUILD_NUMBER} tag NOT pushed. Backfill: git tag testflight/build${BUILD_NUMBER} ${{ github.sha }} && git push origin testflight/build${BUILD_NUMBER}"
            TAG_STATUS="❌ FAILED (see warning)"
          else
            TAG_STATUS="✅ pushed"
          fi

          {
            echo "## TestFlight Upload — build ${BUILD_NUMBER}"
            echo ""
            echo "| Step | Status |"
            echo "| --- | --- |"
            echo "| IPA upload | ${UPLOAD_STATUS} |"
            echo "| What to Test notes | ${NOTES_STATUS} |"
            echo "| testflight/build tag | ${TAG_STATUS} |"
            echo ""
            echo "**Commit:** ${{ github.sha }}"
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # Always upload the build artifacts for debugging — IPA + xcarchive
      # contains the .dSYM bundle needed for symbolicated crash reports
      # if/when Sentry symbol upload gets wired (deferred follow-up).
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-build-${{ steps.build-number.outputs.build_number }}
          path: |
            AmakaFlowCompanion/build/export/*.ipa
            AmakaFlowCompanion/build/AmakaFlowCompanion.xcarchive/dSYMs/
            AmakaFlowCompanion/archive.log
            AmakaFlowCompanion/export.log
            AmakaFlowCompanion/altool.log
          retention-days: 14
          if-no-files-found: warn
