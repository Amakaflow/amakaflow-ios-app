name: PR iOS Tests (docs-only auto-skip)

# AMA-1824 unblock:
# `pr-ios-tests.yml` has `paths-ignore: docs/**, **/*.md, .github/ISSUE_TEMPLATE/**`,
# so docs-only PRs trigger no run, no `iOS Tests (PR - Impacted)` status check
# is posted, and `main` branch protection (which requires that exact check)
# blocks the merge forever. PR #168 + #191 hit this.
#
# This workflow runs ONLY on those ignored paths and posts a passing status
# check with the same name, so docs PRs satisfy the required check without
# spinning up the real macOS sim build.

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

jobs:
  ios-tests:
    name: iOS Tests (PR - Impacted)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Auto-skip iOS Tests for docs-only PR
        run: |
          echo "Docs-only PR — skipping iOS sim build."
          echo "Real iOS test gate runs in pr-ios-tests.yml on impactful paths."
