<style>
  html, body { margin: 0; padding: 0; background: #e9e9ec; font-family: "Geist", system-ui, sans-serif; }
  [data-canvas-theme="dark"] body, body[data-canvas-theme="dark"] { background: #0a0a0b; }

  /* Toast */
  .af-toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #1a1a1c; color: #fff; padding: 10px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 500; z-index: 200;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    animation: toast-in .25s cubic-bezier(.2,.8,.2,1);
    font-family: "Geist", sans-serif;
  }
  @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* Global controls */
  .af-global-bar {
    position: fixed; top: 14px; left: 14px; z-index: 150;
    background: #fff; border: 1px solid #0001; border-radius: 999px;
    padding: 4px; display: flex; gap: 2px; box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    font-family: "Geist", sans-serif;
  }
  .af-global-bar button {
    all: unset; cursor: pointer; padding: 6px 12px; border-radius: 999px;
    font-size: 12px; color: #55575c; font-weight: 500;
  }
  .af-global-bar button[data-on="true"] { background: #1a1a1c; color: #fff; }

  /* Artboard containers (one per frame). Each wraps a themed scope. */
  .af-frame { display: inline-block; }
</style>

// ------------ Prototype: fullscreen interactive flow --------------
function Prototype({ theme }) {
  const initial = {
    tab: 0,
    readiness: 84,
    onboarded: true,
    paired: true,
    history: [
      { date: 'Yesterday', type: 'Ride',  title: 'Recovery spin', dur: '40 min', rpe: 3 },
      { date: 'Apr 22',    type: 'Run',   title: 'Aerobic base, 75% MAF', dur: '48 min', rpe: 4 },
      { date: 'Apr 21',    type: 'Lift',  title: 'Lower body — posterior', dur: '52 min', rpe: 7 },
      { date: 'Apr 19',    type: 'Run',   title: 'Long endurance run', dur: '1h 38m', rpe: 6 },
      { date: 'Apr 18',    type: 'Lift',  title: 'Upper body — push focus', dur: '45 min', rpe: 6 },
    ],
    toast: null,
  };
  const [state, setState] = useState(initial);
  const [screen, setScreen] = useState('home');

  useEffect(() => {
    if (!state.toast) return;
    const t = setTimeout(() => setState(s => ({ ...s, toast: null })), 1800);
    return () => clearTimeout(t);
  }, [state.toast]);

  // Tab-bar navigation
  useEffect(() => {
    const map = ['home', 'workouts', 'coach', 'library', 'history', 'settings'];
    if (map.includes(screen)) {
      setScreen(map[state.tab] || 'home');
    }
  }, [state.tab]);

  const nav = (target) => {
    if (target === 'swap-from-home') {
      setState(s => ({ ...s, toast: 'Opening swap options…' }));
      setScreen('player');
      return;
    }
    if (target === 'home') setState(s => ({ ...s, tab: 0 }));
    if (target === 'workouts') setState(s => ({ ...s, tab: 1 }));
    if (target === 'coach') setState(s => ({ ...s, tab: 2 }));
    if (target === 'library') setState(s => ({ ...s, tab: 3 }));
    if (target === 'history') setState(s => ({ ...s, tab: 4 }));
    if (target === 'settings') setState(s => ({ ...s, tab: 5 }));
    setScreen(target);
  };

  const props = { state, setState, nav };
  const screens = {
    home:       HomeScreen,
    workouts:   WorkoutsScreen,
    coach:      CoachScreen,
    library:    LibraryScreen,
    history:    HistoryScreen,
    settings:   SettingsScreen,
    detail:     DetailScreen,
    'detail-source': DetailFromSourceScreen,
    player:     PlayerScreen,
    completion: CompletionScreen,
    signup:     SignupScreen,
    onboarding: OnboardingScreen,
    pairing:    PairingScreen,
    equipment:  EquipmentScreen,
    messaging:  MessagingScreen,
    paywall:    PaywallMobile,
    landing:    LandingMobile,
    'mental-model': MentalModelScreen,
    'plan-reveal': PlanRevealScreen,
    'weekly-review': WeeklyReviewScreen,
    'watch-delivery': WatchDeliveryScreen,
    'agent-inbox':   AgentInboxScreen,
    'telegram-setup':  TelegramSetupScreen,
    'telegram-idle':    TelegramIdle,
    'telegram-polling': TelegramPolling,
    'telegram-done':    TelegramDone,
    'home-replan':   HomeReplan,
    'home-redflag':  HomeRedFlag,
    'home-lowconf':  HomeLowConf,
    // v3 Part A — essentials
    'telegram-setup-from-messaging': (p) => {
      // Wraps TelegramSetupScreen — on completion, returns to Messaging w/ channel added.
      const wrapNav = (target) => {
        if (target === 'home') {
          // Done — push the channel into MessagingScreen via a state flag, return there.
          p.setState(s => ({ ...s, justConnectedTelegram: true, tab: 5 }));
          p.nav('messaging');
        } else {
          p.nav(target);
        }
      };
      return <TelegramSetupScreen {...p} nav={wrapNav}/>;
    },
    'coach-chat':    CoachChatScreen,
    'edit-profile':  EditProfileScreen,
    'workout-edit':  WorkoutEditorScreen,
    'suggest':       SuggestWorkoutScreen,
    'paywall-pro':   PaywallProScreen,
    'rpe-sheet':     RPESheetScreen,
    'library-detail':LibraryDetailScreen,
    'library-add':   AddToLibraryScreen,
    'programs':      ProgramsListScreen,
    'program-detail':ProgramDetailScreen,
    // v3 Part B — decide-later
    'social':        SocialFeedScreen,
    'pr-celebration':PRCelebrationScreen,
    'pr-history':    PRHistoryScreen,
    'level':         LevelScreen,
    'nutrition':     NutritionScreen,
    'strava-oauth':  StravaOAuthScreen,
    'url-ingest':    URLIngestScreen,
    'reel-ingest':   ReelIngestScreen,
    'qr-scan':       QRScannerScreen,
    'voice-log':     VoiceLogScreen,
    'follow-along':  FollowAlongScreen,
    'share-card':    ShareCardScreen,
    // v3 Part C — secondary
    'analytics':     AnalyticsScreen,
    'sources':       SourcesScreen,
    'shoes':         ShoeMileageScreen,
    'export':        DataExportScreen,
    'debug':         DebugLogScreen,
    'consent':       BiometricConsentScreen,
    'fatigue':       FatigueHistoryScreen,
    'completion-detail': CompletionDetailScreen,
    'rest-day':      RestDayScreen,
    'knowledge':     AddKnowledgeScreen,
    // Connections — reorganized settings hub + per-connection detail
    'connections':     ConnectionsHubScreen,
    'conn-applewatch': ConnAppleWatch,
    'conn-garmin':     ConnGarmin,
    'conn-telegram':   ConnTelegram,
    'conn-sync':       ConnSync,
    'conn-calendar':   ConnCalendar,
  };
  const Cur = screens[screen] || HomeScreen;

  return (
    <div data-theme={theme} className="af" style={{
      height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: theme === 'dark' ? '#0a0a0b' : '#e9e9ec' }}>
      <div className="af-phone" style={{ position: 'relative' }}>
        <div className="af-phone-body">
          <div className="af-statusbar">
            <span>6:14</span>
            <span style={{ display: 'inline-flex', gap: 4, alignItems: 'center' }}>
              <span style={{ fontSize: 10 }}>●●●●</span><span style={{ fontSize: 10 }}>▲</span>
              <span style={{ marginLeft: 2 }}>100</span>
            </span>
          </div>
          <Cur {...props}/>
        </div>
      </div>
      {/* Prototype navigator: jump to any screen */}
      <div style={{ position: 'fixed', right: 20, top: 20, background: 'var(--bg-elev)',
        border: '1px solid var(--border)', borderRadius: 12, padding: 8, zIndex: 120,
        display: 'flex', flexDirection: 'column', gap: 4, minWidth: 160,
        color: 'var(--fg)' }}>
        <div className="af-label" style={{ padding: '4px 8px' }}>JUMP TO</div>
        {Object.keys(screens).map(k => (
          <button key={k} onClick={() => setScreen(k)}
            style={{ all: 'unset', cursor: 'pointer', padding: '6px 10px',
              borderRadius: 6, fontSize: 12,
              background: screen === k ? 'var(--accent-bg)' : 'transparent',
              color: screen === k ? 'var(--fg)' : 'var(--fg-muted)',
              fontFamily: 'var(--font-mono)' }}>
            {k.toUpperCase()}
          </button>
        ))}
      </div>
      {state.toast && <div className="af-toast">{state.toast}</div>}
    </div>
  );
}

// ------------ Canvas: 26 frames (13 × light + 13 × dark) ----------
function FrameScope({ theme, children }) {
  return (
    <div data-theme={theme} className="af" style={{
      background: theme === 'dark' ? '#0a0a0b' : '#e9e9ec',
      padding: 18, display: 'inline-block' }}>
      {children}
    </div>
  );
}

function Screen({ C, desktop, theme, extra }) {
  const fallbackNav = () => {};
  const state = {
    tab: 0, readiness: 84, onboarded: true, paired: true,
    emptyHome: extra && extra.emptyHome === true,
    history: [
      { date: 'Yesterday', type: 'Ride', title: 'Recovery spin', dur: '40 min', rpe: 3 },
      { date: 'Apr 22', type: 'Run', title: 'Aerobic base run', dur: '48 min', rpe: 4 },
      { date: 'Apr 21', type: 'Lift', title: 'Lower body posterior', dur: '52 min', rpe: 7 },
      { date: 'Apr 19', type: 'Run', title: 'Long endurance run', dur: '1h 38m', rpe: 6 },
    ],
  };
  if (extra && typeof extra.tab === 'number') state.tab = extra.tab;
  const props = { state, setState: () => {}, nav: fallbackNav };
  if (desktop) {
    return <FrameScope theme={theme}><Desk><C {...props}/></Desk></FrameScope>;
  }
  return (
    <FrameScope theme={theme}>
      <div className="af-phone"><div className="af-phone-body">
        <div className="af-statusbar">
          <span>6:14</span>
          <span style={{ display: 'inline-flex', gap: 4, alignItems: 'center' }}>
            <span style={{ fontSize: 10 }}>●●●●</span><span style={{ fontSize: 10 }}>▲</span>
            <span style={{ marginLeft: 2 }}>100</span>
          </span>
        </div>
        <C {...props}/>
      </div></div>
    </FrameScope>
  );
}

function Canvas({ themeFilter }) {
  const themes = [];
  if (themeFilter === 'light' || themeFilter === 'both') themes.push('light');
  if (themeFilter === 'dark'  || themeFilter === 'both') themes.push('dark');

  const sectionEls = [];

    sectionEls.push(
      <DCSection key={`${theme}-coverage-a`} id={`${theme}-coverage-a`}
        title={`${theme === 'light' ? 'Light' : 'Dark'} mode · v1 coverage · Part A — essentials`}
        subtitle="Coach chat, Edit profile, Workout editor, Suggest workout, Paywall, RPE sheet, Library detail + add, Programs list + detail">
        {V1COVERAGE_A_FRAMES.map(([id, label, C]) => (
          <DCArtboard key={`${id}-${theme}`} id={`${id}-${theme}`}

            <Screen C={C} theme={theme}/>
          </DCArtboard>
        ))}
      </DCSection>
    );
    sectionEls.push(
      <DCSection key={`${theme}-coverage-b`} id={`${theme}-coverage-b`}
        title={`${theme === 'light' ? 'Light' : 'Dark'} mode · v1 coverage · Part B — [DECIDE: keep/cut for v1]`}
        subtitle="One rep each: Social, PR celebration, PR history, Level/XP, Nutrition, Strava OAuth, URL ingest, Reel ingest, QR scan, Voice log, Follow-along, Share card">

    sectionEls.push(

          </DCArtboard>
        ))}
      </DCSection>
    );
    sectionEls.push(
      <DCSection key={`${theme}-desktop`} id={`${theme}-desktop`}
        title={`${theme === 'light' ? 'Light' : 'Dark'} mode · desktop`}>
        {DESKTOP_FRAMES.map(([id, label, C]) => (
          <DCArtboard key={`${id}-${theme}`} id={`${id}-${theme}`}
            label={label} width={1316} height={856}>
            <Screen C={C} desktop={true} theme={theme}/>
          </DCArtboard>
        ))}
      </DCSection>
    );
  });

  return <DesignCanvas>{sectionEls}</DesignCanvas>;
}

// ------------ App ---------------------------------------------------
function App() {
  const [values, setValue] = useTweaks(TWEAK_DEFAULTS);
  const [mode, setMode] = React.useState('canvas'); // 'canvas' | 'proto'
  const [protoTheme, setProtoTheme] = React.useState('light');

  // Apply accent tokens to :root (both modes)
  React.useLayoutEffect(() => {
    const a = ACCENTS[values.accent] || ACCENTS.lime;
    document.documentElement.style.setProperty('--ready-high', a.high);
    document.documentElement.style.setProperty('--ready-mod',  a.mod);
    document.documentElement.style.setProperty('--ready-low',  a.low);
  }, [values.accent]);

  return (
    <>
      <div className="af-global-bar">
        <button data-on={mode === 'canvas'} onClick={() => setMode('canvas')}>Canvas</button>
        <button data-on={mode === 'proto'}  onClick={() => setMode('proto')}>Prototype</button>
        {mode === 'proto' && (
          <>
            <div style={{ width: 1, background: '#0002', margin: '0 2px' }}/>
            <button data-on={protoTheme === 'light'} onClick={() => setProtoTheme('light')}>☀ Light</button>
            <button data-on={protoTheme === 'dark'}  onClick={() => setProtoTheme('dark')}>☾ Dark</button>
          </>
        )}
      </div>

      {mode === 'canvas'
        ? <Canvas themeFilter={values.globalTheme}/>
        : <Prototype theme={protoTheme}/>}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Prototype">
          <TweakRadio label="View" value={mode}
            onChange={setMode}
            options={[{ value: 'canvas', label: 'Canvas (26 frames)' },
                      { value: 'proto', label: 'Interactive prototype' }]}/>
          {mode === 'proto' && (
            <TweakRadio label="Theme" value={protoTheme} onChange={setProtoTheme}
              options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Dark' }]}/>
          )}
        </TweakSection>
        <TweakSection title="System">
          <TweakSelect label="Readiness accent" value={values.accent}
            onChange={v => setValue('accent', v)}
            options={[
              { value: 'lime',   label: 'Lime (default)' },
              { value: 'mint',   label: 'Mint' },
              { value: 'indigo', label: 'Indigo' },
              { value: 'amber',  label: 'Amber' },
            ]}/>
          <TweakRadio label="Canvas · theme filter" value={values.globalTheme}
            onChange={v => setValue('globalTheme', v)}
            options={[
              { value: 'both', label: 'Both' },
              { value: 'light', label: 'Light only' },
              { value: 'dark', label: 'Dark only' },
            ]}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
