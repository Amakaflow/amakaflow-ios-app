# swift-openapi-generator config for the AMA-1820 codegen.
#
# Source spec: Specs/mobile-bff.json (vendored from amakaflow-backend's
# openapi/mobile-bff.json artifact). Per AMA-1820 the iOS app generates
# from the BFF spec, NOT mapper-api — the BFF is the contract, mapper-api
# is an upstream implementation detail that the BFF is free to reshape.
# See AMA-1817 epic + AMA-1824 mobile-domains.md.
#
# All 5 first-wave routes are kept (locked at the AMA-1824 boundary).
# /health is excluded — operational, not iOS-facing.

generate:
  - types
  - client

filter:
  paths:
    - /v1/workouts/complete
    - /v1/workouts/planned
    - /v1/workouts/{workout_id}/follow-along  # AMA-1917 D1 wedge A
    - /v1/sync/pending
    - /v1/sync/confirm
    - /v1/sync/failed
    - /v1/coaching/profile  # AMA-2008 D5 W2 — equipment/profile (CoachingProfile + EquipmentInventory)

accessModifier: public

# Tags scope generated client methods into named groups; not strictly
# needed, but keeps the generated client API discoverable.
namingStrategy: idiomatic
