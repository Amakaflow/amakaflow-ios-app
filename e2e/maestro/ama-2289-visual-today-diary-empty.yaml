# AMA-2289 — honest empty Today diary (no schedule chrome)
appId: com.myamaka.AmakaFlowCompanion
---
- launchApp:
    appId: com.myamaka.AmakaFlowCompanion
    clearState: true
    permissions:
      notifications: deny
    arguments:
      UITEST_CLERK_TEST_SESSION: "user_id=user_ama2289_empty,email=claude+clerk_test@amakaflow.dev,name=AMA2289 Empty"
      UITEST_SKIP_ONBOARDING: "true"
      UITEST_SKIP_APPLE_WATCH: "true"
      UITEST_USE_FIXTURES: "true"
      UITEST_FIXTURE_STATE: "empty"
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "af_tabbar"
    timeout: 60000
- tapOn:
    id: "today_tab"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      text: "No completed activities yet"
    timeout: 15000
- assertVisible:
    id: "today_empty_diary"
- assertVisible:
    text: "No completed activities yet"
- assertNotVisible:
    text: "Week plan"
- takeScreenshot: docs/ama-2289-visual-evidence/01-today-empty
