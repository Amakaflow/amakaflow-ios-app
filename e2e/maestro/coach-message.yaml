# AMA-2065 / issue #310 — Coach send / receive smoke
# Verifies: Coach tab loads, input bar renders, a message can be sent, and
# the LLM begins a response. Every step is a hard assertion — no runFlow/when
# guards. Replaces the AMA-1821 scaffold that had zero real assertions.
#
# Stable a11y IDs (CoachChatView.swift):
#   af_coach_input  — TextField "Ask your coach..."
#   af_coach_send   — send button
#   coach_screen    — invisible root marker injected by ContentView.tabRoot()
#   coach-message-list — ScrollView wrapping all message bubbles

appId: com.myamaka.AmakaFlowCompanion
---
- launchApp:
    appId: com.myamaka.AmakaFlowCompanion
    permissions:
      notifications: deny
- waitForAnimationToEnd:
    timeout: 5000
# Navigate to Coach tab.
- tapOn:
    id: "coach_tab"
- waitForAnimationToEnd:
    timeout: 3000
# Hard assertion: Coach screen must render.
- assertVisible:
    id: "coach_screen"
# Hard assertion: input bar must be present before typing.
- assertVisible:
    id: "af_coach_input"
- tapOn:
    id: "af_coach_input"
- inputText: "How did my last workout go?"
- tapOn:
    id: "af_coach_send"
# User message must appear in the list (proves send button dispatched the call).
- extendedWaitUntil:
    visible:
      text: "How did my last workout go?"
    timeout: 5000
# LLM streaming indicator: visible while the coach is composing its reply.
# A timeout here means the API call never started (network / auth failure).
- extendedWaitUntil:
    visible:
      text: "Coach is thinking..."
    timeout: 20000
# Wait for streaming to finish (responses typically arrive within 30 s).
- extendedWaitUntil:
    notVisible:
      text: "Coach is thinking..."
    timeout: 45000
# Message list persists after the response — coach interaction proved.
- assertVisible:
    id: "coach-message-list"
