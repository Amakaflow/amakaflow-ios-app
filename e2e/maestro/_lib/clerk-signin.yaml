# AMA-1837 — Reusable Clerk staging sign-in subflow
#
# Drives a real Clerk sign-in against the staging instance
# (ruling-mite-84.clerk.accounts.dev) using the documented `+clerk_test`
# subaddress, which makes Clerk accept the universal verification code
# `424242` regardless of dashboard config (see Clerk docs on "Test mode").
#
# Test credentials (intentionally hardcoded — see below):
#   - Email:  claude+clerk_test@amakaflow.dev
#   - Code:   424242
# Both are PUBLIC Clerk test-mode values, safe to commit. The `+clerk_test`
# subaddress is the documented Clerk pattern that pins the verification
# code to `424242` regardless of dashboard config (see Clerk docs:
# https://clerk.com/docs/testing/test-emails-and-phones). Hardcoding them
# is required for deterministic CI — parameterizing via env vars would
# add a runtime-config foot-gun without any security benefit, since these
# values are explicitly designed by Clerk to be public test fixtures.
#
# This subflow is intentionally idempotent:
#   - If the app is ALREADY signed in (Home tab visible), it is a no-op.
#   - Otherwise it walks the email -> code flow and asserts the Home tab
#     becomes visible within ~30s. If sign-in fails to complete, the flow
#     fails loudly via `assertVisible` rather than silently continuing.
#
# Preconditions for callers:
#   - The app under test must be a build pointed at the STAGING backend
#     (Release config, or Debug with CLERK_PUBLISHABLE_KEY_STAGING set to
#     the ruling-mite-84 key — see memory clerk-instances-by-environment.md).
#   - The simulator must have network access to *.clerk.accounts.dev and the
#     staging mapper-api host.
#   - Test account `claude+clerk_test@amakaflow.dev` must exist in the
#     staging Clerk instance (provisioned via Clerk Backend API — see
#     memory ios-sim-test-loop-recipe.md).
#
# Callers should `runFlow: _lib/clerk-signin.yaml` as their FIRST step and
# then immediately proceed with their own steps. Do NOT add a separate
# `launchApp` step in the caller — this subflow already launches the app
# with the right notification permission.

appId: com.myamaka.AmakaFlowCompanion
---
- launchApp:
    appId: com.myamaka.AmakaFlowCompanion
    permissions:
      notifications: deny
- waitForAnimationToEnd:
    timeout: 5000

# Fast path: already signed in. The "Coach" tab bar item is the canonical
# proof of an authenticated Home state.
- runFlow:
    when:
      visible: "Coach"
    commands:
      - assertVisible: "Coach"
      # Already signed in — nothing else to do.

# Sign-in path: only runs if Coach tab is NOT yet visible AND the email
# input is visible. (If Coach isn't visible but email isn't either, the
# session persisted from a previous run and we just need to walk
# onboarding — the post-signin loop below handles that.)
- runFlow:
    when:
      notVisible: "Coach"
      visible:
        text: "Enter your email"
    commands:
      # Some builds show a one-time "Skip" intro before the email field.
      - runFlow:
          when:
            visible: "Skip"
          commands:
            - tapOn: "Skip"
            - waitForAnimationToEnd:
                timeout: 3000

      - tapOn:
          text: "Enter your email"
      # Clear any autofilled / leftover text (Clerk shows "Last Used"
      # email after a prior session — appending to it produces an
      # invalid identifier on the next run).
      - eraseText
      - inputText: "claude+clerk_test@amakaflow.dev"
      - tapOn:
          text: "Continue"
      - waitForAnimationToEnd:
          timeout: 10000

      # Clerk staging is configured password-first for this test user
      # (the "Email code" link on "Use another method" only shows
      # Apple/Google on this instance — no email-code factor). Enter
      # the dev-instance password from the UITEST_CLERK_PASSWORD env
      # var, then Continue.
      #
      # NEVER hardcode the password here. Pass it at run time:
      #   UITEST_CLERK_PASSWORD=$(grep "^UITEST_CLERK_PASSWORD=" \
      #     ~/.claude/projects/-Users-davidmini/secrets/keys.env \
      #     | cut -d= -f2-) \
      #   maestro test -e UITEST_CLERK_PASSWORD="$UITEST_CLERK_PASSWORD" \
      #     e2e/maestro/.../<flow>.yaml
      #
      # See docs/testing/blueprint.md + memory keys-registry.md.
      # Matches the existing UITEST_AUTH_SECRET / UITEST_USER_ID
      # convention used by other Maestro flows in this repo.
      - runFlow:
          when:
            visible: "Enter password"
          commands:
            - tapOn:
                text: "Enter your password"
            - eraseText
            - inputText: ${UITEST_CLERK_PASSWORD}
            - tapOn:
                text: "Continue"
            - waitForAnimationToEnd:
                timeout: 12000

      # Clerk flow may show a password field first OR jump straight to the
      # 6-digit code screen depending on instance config. Handle both.
      - runFlow:
          when:
            visible: "Check your email"
          commands:
            - inputText: "424242"
            - waitForAnimationToEnd:
                timeout: 12000
      - runFlow:
          when:
            visible: "Verification code"
          commands:
            - inputText: "424242"
            - waitForAnimationToEnd:
                timeout: 12000

# Post-signin onboarding: fresh-install users see a stack of cards
# (Nutrition Awareness, Biometric consent, etc.) before the Coach tab
# is reachable. Tap "Not now" / "Skip" on whatever appears, up to 6
# cards (per ios-sim-test-loop-recipe.md). Lives OUTSIDE the sign-in
# branch so it also runs when the session persisted from a prior run
# and the app launched directly into the onboarding stack.
- repeat:
    times: 6
    commands:
      - runFlow:
          when:
            visible: "Not now"
          commands:
            - tapOn: "Not now"
            - waitForAnimationToEnd:
                timeout: 3000
      - runFlow:
          when:
            visible: "Skip"
          commands:
            - tapOn: "Skip"
            - waitForAnimationToEnd:
                timeout: 3000

# Final assertion: Home/Coach tab must be visible within 30s. If not,
# this fails loudly and aborts the calling flow.
- extendedWaitUntil:
    visible: "Coach"
    timeout: 30000
- assertVisible: "Coach"
