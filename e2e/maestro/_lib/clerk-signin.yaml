# AMA-1837 / AMA-2269 — Reusable Clerk staging sign-in subflow
#
# Primary path (AMA-1849 + AMA-2269): programmatic password session via
# `UITEST_CLERK_REAL_SESSION_EMAIL` + `UITEST_CLERK_PASSWORD` injected at
# launchApp. Staging Clerk is password-first for the CI test user — UI
# email-code sign-in was the root cause of af_tabbar timeouts in CI.
#
# Fallback path: walk the Clerk email/password UI when programmatic auth
# did not hydrate a session (local dev without password env, etc.).
#
# Test email (public Clerk test fixture):
#   claude+clerk_test@amakaflow.dev
# Password: pass at run time via -e UITEST_CLERK_PASSWORD=... (never commit).

appId: com.myamaka.AmakaFlowCompanion
env:
  USE_FIXTURES: ${USE_FIXTURES || "false"}
  UITEST_CLERK_PASSWORD: ${UITEST_CLERK_PASSWORD}
---
- launchApp:
    appId: com.myamaka.AmakaFlowCompanion
    permissions:
      notifications: deny
    arguments:
      UITEST_CLERK_REAL_SESSION_EMAIL: "claude+clerk_test@amakaflow.dev"
      UITEST_CLERK_PASSWORD: ${UITEST_CLERK_PASSWORD}
      UITEST_SKIP_APPLE_WATCH: "true"
      UITEST_USE_FIXTURES: ${USE_FIXTURES}
- waitForAnimationToEnd:
    timeout: 5000

# Auth shell resolves immediately while bypass runs (AMA-2269). Dismiss
# pre-auth gates whenever they appear — repeat after the bypass wait too.
- runFlow: dismiss-pre-auth-onboarding.yaml

# Fast path: programmatic auth or persisted session.
- runFlow:
    when:
      visible:
        id: "af_tabbar"
    commands:
      - tapOn:
          id: "home_tab"
      - assertVisible:
          id: "home_tab"

# Wait for AMA-1849 password bypass (CI sims may migrate data 15–20s post-boot).
- runFlow:
    when:
      notVisible:
        id: "af_tabbar"
    commands:
      - extendedWaitUntil:
          visible:
            id: "af_tabbar"
          timeout: 60000
          optional: true

- runFlow: dismiss-pre-auth-onboarding.yaml
- runFlow: dismiss-post-auth-onboarding.yaml

# AMA-2007 SignUpView: Clerk email UI is behind "Continue with email".
# Fresh CI sims land here when AMA-1849 bypass fails — the old fallback
# waited for "Enter your email" which never appears without this tap.
- runFlow:
    when:
      notVisible:
        id: "af_tabbar"
      visible:
        id: "signup_email_button"
    commands:
      - tapOn:
          id: "signup_email_button"
      - waitForAnimationToEnd:
          timeout: 8000
- runFlow:
    when:
      notVisible:
        id: "af_tabbar"
      visible:
        text: "Continue with email"
    commands:
      - tapOn:
          text: "Continue with email"
      - waitForAnimationToEnd:
          timeout: 8000

# UI fallback when programmatic auth did not complete.
- runFlow:
    when:
      notVisible:
        id: "af_tabbar"
      visible:
        text: "Enter your email"
    commands:
      - tapOn:
          text: "Enter your email"
      - eraseText
      - inputText: "claude+clerk_test@amakaflow.dev"
      - tapOn:
          text: "Continue"
      - waitForAnimationToEnd:
          timeout: 10000
      - runFlow:
          when:
            visible: "Enter password"
          commands:
            - tapOn:
                text: "Enter your password"
            - eraseText
            - inputText: ${UITEST_CLERK_PASSWORD}
            - tapOn:
                text: "Continue"
            - waitForAnimationToEnd:
                timeout: 12000
      - runFlow:
          when:
            visible: "Check your email"
          commands:
            - inputText: "424242"
            - waitForAnimationToEnd:
                timeout: 12000
      - runFlow:
          when:
            visible: "Verification code"
          commands:
            - inputText: "424242"
            - waitForAnimationToEnd:
                timeout: 12000

- runFlow: dismiss-post-auth-onboarding.yaml

- extendedWaitUntil:
    visible:
      id: "af_tabbar"
    timeout: 90000
- tapOn:
    id: "home_tab"
- assertVisible:
    id: "home_tab"
