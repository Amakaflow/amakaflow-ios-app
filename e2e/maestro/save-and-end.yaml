# AMA-1821 / AMA-1817 contract-first epic — Maestro merge gate flow #1
# Top user journey: Start workout -> log sets -> Save & End.
# Adapted from /tmp/maestro-full-workout.yaml (session memory).
#
# AMA-1837: now uses the shared `_lib/clerk-signin.yaml` subflow to perform
# real Clerk staging sign-in before exercising the workout journey. The
# subflow handles `launchApp` itself — do NOT add another launch step here.
# Assumes a workout is queued for the test user once signed in.

appId: com.myamaka.AmakaFlowCompanion
---
- runFlow: _lib/clerk-signin.yaml
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Start workout"
- waitForAnimationToEnd:
    timeout: 4000
- runFlow:
    when:
      visible: "Start on Phone Only"
    commands:
      - tapOn: "Start on Phone Only"
- waitForAnimationToEnd:
    timeout: 4000
- repeat:
    times: 30
    commands:
      - runFlow:
          when:
            visible: "Skip Rest"
          commands:
            - tapOn: "Skip Rest"
            - waitForAnimationToEnd:
                timeout: 1500
      - runFlow:
          when:
            visible: "LOG SET"
          commands:
            - tapOn: "LOG SET"
            - waitForAnimationToEnd:
                timeout: 1500
      - runFlow:
          when:
            visible: "End Workout"
          commands:
            - tapOn: "End Workout"
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible: "End Workout"
    commands:
      - tapOn: "End Workout"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Save & End"
- tapOn: "Save & End"
- waitForAnimationToEnd:
    timeout: 5000
