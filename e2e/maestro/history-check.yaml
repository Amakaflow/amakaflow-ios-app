# AMA-1821 / AMA-1817 contract-first epic — Maestro merge gate flow #2
# Top user journey: After a Save & End, the workout shows up in history.
# Adapted from /tmp/maestro-history-check.yaml.
# Run AFTER save-and-end.yaml (in CI we sequence them in the workflow).
#
# AMA-1837: uses the shared `_lib/clerk-signin.yaml` subflow for real
# Clerk staging sign-in. The subflow performs `launchApp` itself.

appId: com.myamaka.AmakaFlowCompanion
---
- runFlow: _lib/clerk-signin.yaml
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "More"
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: "more_row_history"
- waitForAnimationToEnd:
    timeout: 3000
# Asserts the history screen actually rendered. We do not assert a specific
# workout name because the seeded workout may vary across CI runs; the
# screen rendering is itself proof the API round-trip succeeded.
- assertVisible:
    id: "history_screen"
    optional: true
