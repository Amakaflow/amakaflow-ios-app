# AMA-2291 visual validation — unified detail + Start sheet
#
# Auth: UITEST_CLERK_TEST_SESSION + UITEST_SKIP_ONBOARDING + fixtures.
# UITEST_GARMIN_PAIRED mocks Garmin primary default on Start sheet.
appId: com.myamaka.AmakaFlowCompanion
---
- launchApp:
    appId: com.myamaka.AmakaFlowCompanion
    clearState: true
    permissions:
      notifications: deny
    arguments:
      UITEST_CLERK_TEST_SESSION: "user_id=user_ama2291_visual,email=claude+clerk_test@amakaflow.dev,name=AMA2291 Visual"
      UITEST_SKIP_ONBOARDING: "true"
      UITEST_SKIP_APPLE_WATCH: "true"
      UITEST_USE_FIXTURES: "true"
      UITEST_GARMIN_PAIRED: "true"
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "af_tabbar"
    timeout: 60000
- tapOn:
    id: "library_tab"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "af_library_fab"
    timeout: 15000
# Open Instagram-sourced fixture (HIIT Follow-Along)
- tapOn:
    text: "HIIT Follow-Along"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "af_workout_detail_screen"
    timeout: 15000
- assertVisible:
    id: "af_workout_detail_edit"
- assertVisible:
    id: "af_workout_detail_start"
- assertVisible:
    id: "af_workout_detail_credit_row"
- takeScreenshot: docs/ama-2291-visual-evidence/01-detail-social
- tapOn:
    id: "af_workout_detail_start"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "af_start_sheet"
    timeout: 10000
- assertVisible:
    id: "af_start_device_garmin"
- assertVisible:
    id: "af_start_device_apple"
- assertVisible:
    id: "af_start_device_phone"
- takeScreenshot: docs/ama-2291-visual-evidence/02-start-sheet-garmin-default
- scroll
- extendedWaitUntil:
    visible:
      id: "af_start_gym_unset"
    timeout: 5000
- assertVisible:
    id: "af_start_gym_unset"
- tapOn:
    text: "Close start sheet"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      id: "af_workout_detail_edit"
    timeout: 10000
- tapOn:
    id: "af_workout_detail_edit"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "workout_name_field"
    timeout: 10000
- takeScreenshot: docs/ama-2291-visual-evidence/03-edit-open
- tapOn:
    text: "Cancel"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "af_workout_detail_back"
- waitForAnimationToEnd:
    timeout: 2000
# Open Manual-sourced fixture
- scrollUntilVisible:
    element:
      text: "Manual EMOM Strength"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "Manual EMOM Strength"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "af_workout_detail_screen"
    timeout: 15000
- assertVisible:
    id: "af_workout_detail_edit"
- assertVisible:
    id: "af_workout_detail_start"
- takeScreenshot: docs/ama-2291-visual-evidence/04-detail-manual
