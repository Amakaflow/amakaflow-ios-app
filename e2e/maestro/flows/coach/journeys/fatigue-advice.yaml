# AMA-2260 — Fatigue advisor journey (PR maestro label, warn-only)

appId: com.myamaka.AmakaFlowCompanion
---
- runFlow: ../../../_lib/clerk-signin.yaml
- tapOn:
    id: "coach_tab"
- assertVisible:
    id: "coach_screen"
- tapOn:
    id: "coach-options-menu"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "coach-menu-fatigue-advisor"
- extendedWaitUntil:
    visible:
      id: "fatigue-advisor-screen"
    timeout: 15000
- assertVisible:
    id: "fatigue-advisor-screen"
