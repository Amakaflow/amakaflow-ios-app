# AMA-2286: Start → Garmin shows real push status (not AMA-2291 stub).
# Success path uses fixtures + FixtureAPIService push stub (pushed state).
# Forced fail: launch with UITEST_GARMIN_PUSH_FAIL=not_paired for unpaired copy.
appId: com.amakaflow.companion
---
- launchApp:
    clearState: false
    arguments:
      UITEST_MODE: "1"
      UITEST_USE_FIXTURES: "1"
      UITEST_FIXTURES: "strength_block_w1"
      UITEST_GARMIN_PAIRED: "1"
- tapOn:
    id: "af_tab_library"
- tapOn:
    id: "af_library_workout_row"
    optional: true
- tapOn:
    id: "af_workout_detail_start"
    optional: true
- tapOn:
    id: "af_start_device_garmin"
    optional: true
- tapOn:
    id: "af_start_confirm"
    optional: true
- assertVisible:
    id: "af_workout_detail_handoff_status"
- assertNotVisible: "AMA-2286 push stub"
- takeScreenshot: ama-2286-garmin-handoff-status
