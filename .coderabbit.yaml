# CodeRabbit configuration — AmakaFlow iOS
# Docs: https://docs.coderabbit.ai/reference/configuration

language: "en-US"

reviews:
  profile: "assertive"
  # AMA-1592: disable auto-review to eliminate CodeRabbit ping-pong on every push.
  # Trigger a review explicitly with `@coderabbitai review` or add the `review-ready` label.
  # Max 2 reviews per PR total (see memory: coderabbit-one-pass-per-batch.md).
  auto_review:
    enabled: false
    drafts: false
  request_changes_workflow: false
  high_level_summary: true

knowledge_base:
  linear:
    usage: enabled
    team_keys:
      - "AMA"
  mcp:
    usage: enabled
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
      - "docs/**/*.md"
